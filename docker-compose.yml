services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quizhub-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_Password123!}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  backend:
    container_name: quizhub-backend
    build:
      context: ./backend
      dockerfile: QuizHub/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=QuizHubDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Password123!};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true
      Frontend__BaseUrl: http://localhost:5173
    ports:
      - "5099:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    container_name: quizhub-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
